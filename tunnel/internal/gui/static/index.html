<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>OpenCode Tunnel</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;background:#0d0d0d;color:#eee;font-size:14px;line-height:1.5;padding:24px;max-width:640px;margin:0 auto}
h1{font-size:1.3rem;font-weight:600;margin-bottom:4px;color:#fff}
.subtitle{color:#888;margin-bottom:20px;font-size:0.85rem}
.card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:16px;margin-bottom:14px}
.card-title{font-size:0.85rem;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px}
.row{display:flex;gap:10px;margin-bottom:8px}
.row.cols-2>*{flex:1}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.field label{font-size:0.8rem;color:#888}
.field input,.field select{background:#222;border:1px solid #333;color:#eee;padding:8px 10px;border-radius:6px;font-size:0.9rem;outline:none;transition:border-color .2s}
.field input:focus{border-color:#4a9eff}
.status-bar{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#151515;border-radius:8px;margin-bottom:14px;font-size:0.85rem}
.status-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.status-dot.off{background:#555}
.status-dot.ok{background:#4caf50}
.status-dot.err{background:#e5534b}
.status-dot.busy{background:#ffab00}
.btn{background:#333;border:none;color:#eee;padding:8px 14px;border-radius:6px;cursor:pointer;font-size:0.85rem;transition:background .15s;white-space:nowrap}
.btn:hover{background:#444}
.btn-primary{background:#1a6bff;color:#fff}
.btn-primary:hover{background:#4080ff}
.btn-primary:disabled{background:#555;color:#888;cursor:default}
.btn-danger{background:#6b1a1a;color:#e5534b}
.btn-danger:hover{background:#8a2222}
.btn-sm{padding:5px 10px;font-size:0.8rem}
.btn-group{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.log-box{background:#0a0a0a;border:1px solid #222;border-radius:6px;padding:8px;height:180px;overflow-y:auto;font-family:'SF Mono','Consolas','Courier New',monospace;font-size:0.75rem;line-height:1.6;color:#aaa;white-space:pre-wrap;word-break:break-all}
.log-box .ts{color:#555}
.log-box .ok{color:#4caf50}
.log-box .err{color:#e5534b}
.log-box .info{color:#4a9eff}
.footer{display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:12px;border-top:1px solid #222;font-size:0.8rem}
.footer label{display:flex;align-items:center;gap:6px;color:#888;cursor:pointer}
.advanced{display:none;margin-top:8px}
.advanced.show{display:block}
.btn-link{background:none;border:none;color:#4a9eff;cursor:pointer;font-size:0.8rem;padding:0}
.btn-link:hover{text-decoration:underline}
.route-selector{display:flex;gap:4px;margin-bottom:14px;background:#151515;border-radius:8px;padding:3px}
.route-btn{flex:1;text-align:center;padding:6px;border:none;background:none;color:#888;cursor:pointer;border-radius:6px;font-size:0.85rem;transition:all .15s}
.route-btn.active{background:#2a2a2a;color:#fff}
.route-btn:hover:not(.active){color:#eee}
.section{display:none}
.section.active{display:block}
input[type="checkbox"]{accent-color:#4a9eff}
@media(prefers-color-scheme:light){body{background:#f5f5f5;color:#222}.card{background:#fff;border-color:#ddd}.card-title{color:#666}.field input{background:#fff;border-color:#ccc;color:#222}.status-bar{background:#eee}.log-box{background:#fafafa;border-color:#ddd;color:#555}.btn{background:#e0e0e0;color:#222}.btn:hover{background:#d0d0d0}.route-selector{background:#eee}.route-btn.active{background:#ddd}.footer{border-color:#ddd}}
</style>
</head>
<body>

<div style="text-align:center;margin-bottom:16px">
<img src="/logo.jpg" alt="OpenCode" style="width:48px;height:48px;border-radius:10px">
<div style="font-size:1.1rem;font-weight:600;color:#fff;margin-top:4px">OpenCode Tunnel</div>
<div style="font-size:0.75rem;color:#666">Conexión remota para OpenCode Mobile</div>
</div>

<div class="route-selector">
<button class="route-btn active" data-section="tunnel">Túnel</button>
<button class="route-btn" data-section="server">Servidor</button>
</div>

<div class="section active" id="section-tunnel">
<div class="status-bar" id="statusBar">
<span class="status-dot off" id="statusDot"></span>
<span id="statusText">Desconectado</span>
</div>

<div class="card">
<div class="card-title">Conexión Remota</div>
<div class="row cols-2">
<div class="field"><label>Nombre del túnel</label><input id="tunnelName" placeholder="ej. MiOficina"></div>
<div class="field"><label>Contraseña</label><input id="tunnelPass" type="password" placeholder="Contraseña"></div>
</div>
<div class="field"><label>Host local</label><input id="tunnelHost" placeholder="127.0.0.1"></div>
<div class="row cols-2">
<div class="field"><label>Puerto</label><input id="tunnelPort" type="number" placeholder="3000"></div>
<div class="field"><label>URL señalización</label><input id="signalingUrl" placeholder="wss://..."></div>
</div>
<div class="btn-group">
<button class="btn btn-primary" id="btnConnect">Conectar túnel</button>
<button class="btn btn-danger" id="btnDisconnect">Desconectar</button>
<button class="btn" id="btnToggleAdvanced">Avanzado</button>
</div>
</div>

<div class="card" id="cardServer">
<div class="card-title">Servidor OpenCode</div>
<div id="serverStatus" style="margin-bottom:8px;font-size:0.85rem;color:#888">No verificado</div>
<div class="btn-group">
<button class="btn btn-primary" id="btnDiscover">Detectar servidor</button>
<button class="btn" id="btnSelectBin">Seleccionar binario...</button>
<button class="btn" id="btnStartServer">Iniciar servidor</button>
</div>
</div>
</div>

<div class="section" id="section-server">
<div class="card">
<div class="card-title">Configuración del Servidor</div>
<div class="field"><label>Binario de OpenCode</label>
<div class="row"><input id="binPath" placeholder="Ruta al ejecutable de opencode" style="flex:1"><button class="btn btn-sm" id="btnBrowseBin">Buscar...</button></div>
</div>
<div class="field"><label>Puerto</label><input id="svPort" type="number" placeholder="3000"></div>
<div class="btn-group"><button class="btn btn-primary" id="btnSaveServer">Guardar</button></div>
</div>

<div class="card">
<div class="card-title">Inicio Automático</div>
<label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="chkAutoStart"> Iniciar tunnel al encender el equipo</label>
</div>
</div>

<div class="card">
<div class="card-title">Registro</div>
<div class="log-box" id="logBox"></div>
<div class="footer">
<label><input type="checkbox" id="chkAutoStartFooter" onchange="document.getElementById('chkAutoStart').checked=this.checked;saveAutostart(this.checked)"> Auto-inicio</label>
<button class="btn-link" onclick="document.getElementById('logBox').innerHTML=''">Limpiar</button>
</div>
</div>

<script>
const LS_KEY = 'opencode_tunnel_cfg'

function loadLocal() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || {} } catch { return {} }
}
function saveLocal(data) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(data)) } catch {}
}

function get(id) { return document.getElementById(id) }
function val(id) { return get(id).value }
function setVal(id, v) { get(id).value = v || '' }

function log(msg, cls) {
  const box = get('logBox')
  const line = document.createElement('div')
  const ts = new Date().toLocaleTimeString('es-ES', {hour:'2-digit',minute:'2-digit',second:'2-digit'})
  line.innerHTML = `<span class="ts">[${ts}]</span> <span class="${cls||''}">${msg}</span>`
  box.appendChild(line)
  box.scrollTop = box.scrollHeight
}

function setStatus(text, cls) {
  const dot = get('statusDot')
  dot.className = 'status-dot ' + (cls || 'off')
  get('statusText').textContent = text
}

async function api(method, body) {
  try {
    const opts = { headers: { 'Content-Type': 'application/json' } }
    if (body) opts.body = JSON.stringify(body)
    opts.method = method === 'GET' ? 'GET' : 'POST'
    if (method === 'GET') delete opts.body
    const res = await fetch('/api' + (method.startsWith('/') ? method : '/' + method), opts)
    if (method.startsWith('/log') || method.startsWith('log')) return res
    return await res.json()
  } catch (e) {
    log('Error de red: ' + e.message, 'err')
    return { ok: false, error: e.message }
  }
}

async function discover() {
  const r = await api('discover')
  if (r.found) {
    if (r.running) {
      get('serverStatus').textContent = '● Corriendo — puerto ' + r.port + ' · v' + (r.version || '?')
      get('serverStatus').style.color = '#4caf50'
    } else {
      get('serverStatus').textContent = '○ Detectado — ' + (r.bin || '') + ' · v' + (r.version || '?')
      get('serverStatus').style.color = '#ffab00'
    }
  } else {
    get('serverStatus').textContent = '✗ ' + (r.error || 'No encontrado')
    get('serverStatus').style.color = '#e5534b'
  }
  if (r.bin) setVal('binPath', r.bin)
  if (r.port) setVal('svPort', r.port)
}

async function checkStatus() {
  const r = await api('status')
  if (r.server === 'running') {
    get('serverStatus').textContent = '● Corriendo — puerto ' + r.port + ' · v' + (r.version || '?')
    get('serverStatus').style.color = '#4caf50'
  } else if (r.server === 'stopped') {
    get('serverStatus').textContent = '○ Detenido — ' + (r.bin || '')
    get('serverStatus').style.color = '#ffab00'
  } else {
    get('serverStatus').textContent = '✗ No verificado'
    get('serverStatus').style.color = '#888'
  }
  if (r.tunnel === 'connected') {
    setStatus('Conectado (' + (r.tunnelId || '') + ')', 'ok')
  } else if (r.tunnel === 'connecting') {
    setStatus('Conectando...', 'busy')
  } else if (r.tunnel === 'error') {
    setStatus('Error', 'err')
  } else {
    setStatus('Desconectado', 'off')
  }
  if (r.bin) setVal('binPath', r.bin)
}

get('btnConnect').onclick = async () => {
  const name = val('tunnelName')
  const password = val('tunnelPass')
  if (!name || !password) {
    log('Completá nombre y contraseña primero', 'err')
    return
  }

  // 1. Asegurar que el servidor opencode esté corriendo
  log('Verificando servidor opencode...', 'info')
  const disc = await api('discover')

  if (!disc.running && disc.bin) {
    log('Iniciando servidor...', 'busy')
    const start = await api('start-server?port=' + (parseInt(val('tunnelPort')) || 3000))
    if (!start.ok) {
      log('No se pudo iniciar el servidor: ' + (start.error || ''), 'err')
      return
    }
    log('Servidor iniciado', 'ok')
  } else if (!disc.found) {
    log('Servidor no encontrado. Usá "Seleccionar binario" primero.', 'err')
    return
  }

  // 2. Conectar túnel
  log('Conectando túnel como "' + name + '"...', 'info')
  const r = await api('tunnel/connect', {
    name, password,
    signalingUrl: val('signalingUrl'),
    host: val('tunnelHost'),
    port: parseInt(val('tunnelPort'))
  })
  if (r.ok) {
    setStatus('Conectando...', 'busy')
    log('Túnel conectado — ya podés usar OpenCode desde el celular', 'ok')
    // 3. Guardar config automáticamente
    saveConfig()
  }
}

get('btnDisconnect').onclick = async () => {
  await api('tunnel/disconnect')
  setStatus('Desconectado', 'off')
}

get('btnDiscover').onclick = discover

get('btnSelectBin').onclick = () => {
  const input = document.createElement('input')
  input.type = 'file'
  if (navigator.userAgent.includes('Windows')) {
    input.accept = '.exe,.cmd,.bat'
  }
  input.onchange = async () => {
    if (input.files[0]) {
      const path = input.files[0].name
      log('Archivo seleccionado: ' + input.files[0].name, 'info')
      await api('select-bin?path=' + encodeURIComponent(input.files[0].name))
      setVal('binPath', input.files[0].name)
      discover()
    }
  }
  input.click()
}

get('btnStartServer').onclick = async () => {
  const port = val('tunnelPort') || '3000'
  const r = await api('start-server?port=' + port)
  if (r.ok) {
    await discover()
  }
}

get('btnSaveServer').onclick = saveConfig

get('btnToggleAdvanced').onclick = () => {
  const advanced = document.querySelector('.advanced')
  if (advanced) advanced.classList.toggle('show')
}

get('chkAutoStart').onchange = function() {
  get('chkAutoStartFooter').checked = this.checked
  saveAutostart(this.checked)
}
get('chkAutoStartFooter').onchange = function() {
  get('chkAutoStart').checked = this.checked
  saveAutostart(this.checked)
}

async function saveAutostart(checked) {
  await api('autostart', { enabled: checked })
}

async function saveConfig() {
  const r = await api('save', {
    name: val('tunnelName'),
    password: val('tunnelPass'),
    signalingUrl: val('signalingUrl'),
    host: val('tunnelHost'),
    port: parseInt(val('tunnelPort')) || 3000,
    binPath: val('binPath')
  })
  if (r.ok) log('Configuración guardada', 'ok')
}

// Route switching
document.querySelectorAll('.route-btn').forEach(btn => {
  btn.onclick = function() {
    document.querySelectorAll('.route-btn').forEach(b => b.classList.remove('active'))
    this.classList.add('active')
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'))
    const section = get('section-' + this.dataset.section)
    if (section) section.classList.add('active')
  }
})

// Load saved config and auto-connect
async function init() {
  const r = await api('status')

  // Cargar datos guardados
  if (r.bin) setVal('binPath', r.bin)
  if (r.port) { setVal('svPort', r.port); setVal('tunnelPort', r.port) }
  if (r.configName) {
    setVal('tunnelName', r.configName)
    setVal('tunnelHost', r.configHost || '127.0.0.1')
  }

  setVal('tunnelHost', r.configHost || '127.0.0.1')
  setVal('tunnelPort', r.port || 3000)

  // Auto-detectar server al iniciar
  await discover()
  checkStatus()

  // Auto-conectar si hay nombre+contraseña guardados
  if (val('tunnelName') && val('tunnelPass')) {
    log('Config guardada encontrada — conectando automáticamente...', 'info')
    get('btnConnect').click()
  }

  // SSE log stream
  const es = new EventSource('/api/log')
  es.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data)
      if (msg.type === 'log') {
        log(msg.message)
      }
    } catch {}
  }
}

init()
</script>
</body>
</html>
