name: Build Android AAB (Play Store)

on:
  push:
    tags:
      - 'v*-play'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag'
        required: false
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web

      - name: Build web app
        run: pnpm build
        working-directory: web

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Add Capacitor Android platform
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi
        working-directory: web

      - name: Generate Android app icon assets
        run: npx @capacitor/assets generate --android --assetPath public --iconBackgroundColor '#0b1020' --iconBackgroundColorDark '#0b1020'
        working-directory: web

      - name: Sync Capacitor project
        run: npx cap sync android
        working-directory: web

      - name: Enable R8 minification for Play Store
        run: |
          sed -i 's/minifyEnabled false/minifyEnabled true/' web/android/app/build.gradle

      - name: Read app version
        id: version
        run: |
          APP_VERSION=$(node -p "require('./web/package.json').version")
          VERSION_CODE=$(node -e "const [major, minor, patch] = process.argv[1].split('.').map(Number); console.log((major * 10000) + (minor * 100) + patch)" "$APP_VERSION")
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Sync Android version metadata
        run: node web/scripts/sync-android-version.mjs "${{ steps.version.outputs.app_version }}" "${{ steps.version.outputs.version_code }}"

      - name: Decode keystore for Gradle signing
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > web/android/app/release.keystore
          echo "ANDROID_KEYSTORE_PATH=release.keystore" >> "$GITHUB_ENV"

      - name: Build signed release AAB
        run: ./gradlew bundleRelease --stacktrace --no-daemon
        working-directory: web/android
        env:
          ANDROID_KEYSTORE_PATH: ${{ env.ANDROID_KEYSTORE_PATH || '' }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || '' }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS || '' }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD || '' }}

      - name: Verify AAB signature
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          jarsigner -verify -verbose web/android/app/build/outputs/bundle/release/app-release.aab

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencode-mobile-aab-v${{ steps.version.outputs.app_version }}
          path: web/android/app/build/outputs/bundle/release/app-release.aab
